apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  generateName: tax-calculator-run-
spec:
  pipelineRef:
    name: tax-calculator-pipeline

  params:
    - name: repo-url
      value: https://github.com/<your-username>/<your-repository>

    - name: image-reference
      value: us.icr.io/<namespace>/tax-calculator:latest

  workspaces:
    - name: pipeline-workspace
      persistentVolumeClaim:
        claimName: pipeline-pvc
